# Transparency & blur — KDE KWin picks up the blur hint automatically
background_opacity 0.8
background_blur 20

# Font
font_family Hack Nerd Font
font_size 13

# Dark background for contrast against the translucent window
background #121212
foreground #e0e0e0

# Smooth scrolling & cursor
cursor_shape beam
cursor_blink_interval 0.5
scrollback_lines 10000

# Window padding for a cleaner look
window_padding_width 8

# Disable audio bell
enable_audio_bell no
