# ==============================================================================
# MangoWM Configuration File
# Save this to ~/.config/mango/config.conf
# ==============================================================================

# --- Environment & Autostart ---
exec-once = waybar
exec-once = mako
exec-once = wpaperd
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wlsunset -l 45.5 -L -73.6 -t 2700 -T 6500
exec-once = sh -c 'export XCURSOR_THEME=breeze_cursors XCURSOR_SIZE=24; xsetroot -cursor_name left_ptr 2>/dev/null; true'

xkb_rules_layout=ca

# --- Window Effects & Theme ---
border_radius = 12
blur = 1


# --- Workspace / Tag Animation Direction ---
# 1 = Horizontal (left/right)
# 0 = Vertical (up/down)
tag_animation_direction=0

# --- Inner Gaps (Spacing between tiled windows) ---
gappih=0   # Inner horizontal gap
gappiv=0   # Inner vertical gap

# --- Outer Gaps (Spacing between windows and screen edges) ---
gappoh=0   # Outer horizontal gap
gappov=0   # Outer vertical gap

smartgaps=0

# --- Layout Configuration ---
# MangoWM supports per-tag layout assignments.
# To resemble Niri's workflow, force the "scroller" layout on your active tags:
tagrule = id:1,layout_name:scroller
tagrule = id:2,layout_name:scroller
tagrule = id:3,layout_name:scroller

# --- Scroller Layout Sizing Rules ---
# New windows take up exactly 50% of screen width
scroller_default_proportion = 0.5
# The first window opens full screen
scroller_default_proportion_single = 1.0
# Presets you can cycle through dynamically
scroller_proportion_preset = 0.5,0.8,1.0
scroller_ignore_proportion_single=0

# --- Keybindings ---
# Format: bind = MODIFIERS, KEY, ACTION, ARGUMENTS

# Application Launchers
bind = SUPER, space, spawn, fuzzel
bind = SUPER, T, spawn, kitty
bind = SUPER, B, spawn, firefox
bind = SUPER, D, spawn, thunar

# Window Actions
bind = SUPER, X, killclient
bind = SUPER, F, togglefullscreen
# Force an app to take up the whole screen (keeps decoration/bar)
#bind = SUPER, M, togglemaximizescreen
bind = SUPER, G, togglefloating

# MOUSE
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER+ALT,btn_left,moveresize,curresize
#mousebind=SUPER,SHIFT,btn_left,moveresize,curresize

# TRACKPAD
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,viewtoleft_have_client
gesturebind=none,down,3,viewtoright_have_client

# Window Resizing (Horizontal)
# Shrink window width horizontally
bind = SUPER+SHIFT, Left, resizewin, -50, 0
# Expand window width horizontally
bind = SUPER+SHIFT, Right, resizewin, 50, 0

# Tag/Workspace Navigation & Window Moving (Vertical Emulation)
bind = CTRL+ALT, Up, viewtoleft, 0
bind = CTRL+ALT, Down, viewtoright, 0
# Move focused window to previous workspace
bind = CTRL+ALT+SHIFT, Up, tagtoleft, 0
# Move focused window to next workspace
bind = CTRL+ALT+SHIFT, Down, tagtoright, 0

# Volume Up (Increases by 5%)
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# Volume Down (Decreases by 5%)
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# Toggle Mute
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media Player controls
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# Column/Window Focus & Window Moving (Horizontal)
bind = CTRL+ALT, Left, focusstack, prev
bind = CTRL+ALT, Right, focusstack, next
# Move window left inside the workspace
bind = CTRL+ALT+SHIFT, Left, exchange_client, left
# Move window right inside the workspace
bind = CTRL+ALT+SHIFT, Right, exchange_client, right

# Scroller Sizing Tweaks (Niri-Style)
# Cycle a window between 50%, 80%, and 100% width
bind = SUPER, M, switch_proportion_preset

# Configuration Management
# Reload this configuration file on the fly
bind = SUPER, R, reload_config

# Bluelight Filter Toggle
bind = SUPER, N, spawn_shell, /home/niwatorichan/.config/waybar/scripts/wlsunset.sh toggle

bind = none, Print, spawn_shell, grim -g "$(slurp)" - | wl-copy
bind = CTRL, Print, spawn_shell, grim - | wl-copy
bind = ALT, Print, spawn_shell, geom=$(mmsg -x | awk '/x / {x=$3} /y / {y=$3} /width / {w=$3} /height / {h=$3} END {print x "," y " " w "x" h}') && grim -g "$geom" - | wl-copy

# Drop back to the SDDM login screen cleanly (keeps apps open in background)
bind=Super,L,spawn,dbus-send --system --type=method_call --print-reply --dest=org.freedesktop.DisplayManager /org/freedesktop/DisplayManager/Seat0 org.freedesktop.DisplayManager.Seat.SwitchToGreeter



# --- Window Effects Configuration ---
blur=1                     # 1 = Enable window background blur
blur_layer=1               # 1 = Enable blur on layer shell surfaces (like tofi)
blur_optimized=1           # Keeps performance smooth by caching the blur

# --- Blur Tuning ---
blur_params_radius=6       # Controls how strong the frosted glass blur looks
blur_params_num_passes=2   # Number of passes (higher looks cleaner, heavier on GPU)

# --- Opacity Triggers ---
#focused_opacity=0.90       # Forces all focused windows to 90% opacity
#unfocused_opacity=0.80     # Dims background windows to 80% opacity

# 3. Target Thunar exclusively to override the global opacity rules
windowrule=appid:thunar,focused_opacity:0.85
windowrule=appid:thunar,unfocused_opacity:0.75

# --- Target Zed Editor Exclusively ---
windowrule=appid:dev.zed.Zed,focused_opacity:0.90
windowrule=appid:dev.zed.Zed,unfocused_opacity:0.80

# --- Target Blueman Manager Exclusively ---
windowrule=appid:blueman-manager,focused_opacity:0.85
windowrule=appid:blueman-manager,unfocused_opacity:0.75

# --- Target Emacs Exclusively ---
windowrule=appid:emacs,focused_opacity:0.85
windowrule=appid:emacs,unfocused_opacity:0.75
windowrule=appid:org.gnu.emacs,focused_opacity:0.85
windowrule=appid:org.gnu.emacs,unfocused_opacity:0.75

# --- Target OpenCode Exclusively ---
windowrule=appid:opencode-desktop,focused_opacity:0.85
windowrule=appid:opencode-desktop,unfocused_opacity:0.75
windowrule=appid:OpenCode,focused_opacity:0.85
windowrule=appid:OpenCode,unfocused_opacity:0.75

# --- Float the "About This System" fastfetch terminal ---
windowrule=appid:nixos-about,float:1
windowrule=appid:nixos-about,focused_opacity:0.90
windowrule=appid:nixos-about,unfocused_opacity:0.85
